<html lang="id">

        .header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grid" width="10" height="10"><path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>'); opacity: 0.3; }

        .sys-info br { margin: 10px 0; }
        .section-title { margin: 30px 0 20px; font-size: 20px; color: #2c3e50; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
        
        .log-content { padding: 25px; background: #1e1e1e; border-radius: 10px; color: #d4d4d4; font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; line-height: 1.6; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; max-height: 600px; overflow-y: auto; }

        .log-content::-webkit-scrollbar-thumb { background: #667eea; border-radius: 4px; }
        .log-content::-webkit-scrollbar-thumb:hover { background: #764ba2; }
        
        .no-log { text-align: center; padding: 40px; color: #7f8c8d; font-size: 16px; }
        
        .footer { text-align: center; margin-top: 40px; padding: 25px; background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); color: #ecf0f1; font-size: 13px; }
        .footer strong { color: #fff; font-size: 16px; display: block; margin-bottom: 8px; }
        @media print { body { background: #fff; } .container { box-shadow: none; margin: 0; } .log-selector { display: none; } .content-wrapper { display: block; margin: 0; } }
        @media (max-width: 768px) { .container { margin: 20px; } .content-wrapper { flex-direction: column; margin: 20px; } .sys-info, .log-content { margin-left: 0; margin-right: 0; } }

            function populateDropdown() {
                logSelect.innerHTML = '';
                if (LOG_FILES.length === 0) {
                    const option = document.createElement('option');
                    option.value = '';
                    option.textContent = 'No log files found';
                    logSelect.appendChild(option);
                    logCountEl.textContent = '';
                    return;
                }

                LOG_FILES.forEach(function(log, i) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = log.n;
                    logSelect.appendChild(option);
                });

                logCountEl.textContent = LOG_FILES.length + ' log file(s) found';

                logSelect.addEventListener('change', function() {
                    if (this.value !== '') {
                        displayLog(LOG_FILES[this.value].d, LOG_FILES[this.value].n);
                    }
                });

                // Auto-select first log
                if (LOG_FILES.length > 0) {
                    logSelect.selectedIndex = 0;
                    displayLog(LOG_FILES[0].d, LOG_FILES[0].n);
                }
            }

            function displayLog(content, filename) {
                // Decode base64 content
                let decoded = '';
                try {
                    const bytes = Uint8Array.from(atob(content), c => c.charCodeAt(0));
                    decoded = new TextDecoder('utf-8').decode(bytes);
                } catch(e) {
                    decoded = 'Error decoding log content';
                }

                logContent.textContent = decoded;
                
                const sysInfoData = extractSysInfo(decoded);
                if (sysInfoData) {
                    sysInfo.innerHTML = sysInfoData;
                    sysInfo.style.display = 'block';
                } else {
                    sysInfo.style.display = 'none';
                }
            }

            function extractSysInfo(content) {
                const lines = content.split('\n');
                let data = {};
                let inOverview = false;
                let inPerformance = false;
                let perfMetrics = [];

                for (let line of lines) {
                    line = line.trim();

                    if (line.startsWith('[OVERVIEW]')) {
                        inOverview = true;
                        inPerformance = false;
                        continue;
                    }
                    if (line.startsWith('[PERFORMANCE METRICS]')) {
                        inPerformance = true;
                        inOverview = false;
                        continue;
                    }
                    if (line.startsWith('[') && !line.startsWith('[OVERVIEW]') && !line.startsWith('[PERFORMANCE METRICS]')) {
                        inOverview = false;
                        inPerformance = false;
                    }

                    if (inOverview && line.includes(':')) {
                        const parts = line.split(':');
                        const key = parts[0].trim();
                        const value = parts.slice(1).join(':').trim();
                        data[key] = value;
                    }

                    if (inPerformance && line.includes(':')) {
                        perfMetrics.push(line);
                    }
                }

                if (Object.keys(data).length === 0) return null;

                let html = '';
                if (data['Generated']) html += '<strong>Generated:</strong> ' + data['Generated'] + '<br>';
                if (data['Computer Name']) html += '<strong>Computer Name:</strong> ' + data['Computer Name'] + '<br>';
                if (data['Manufacturer']) html += '<strong>Manufacturer:</strong> ' + data['Manufacturer'] + '<br>';
                if (data['Model']) html += '<strong>Model:</strong> ' + data['Model'] + '<br>';
                if (data['OS']) html += '<strong>OS:</strong> ' + data['OS'] + '<br>';
                if (perfMetrics.length > 0) {
                    html += '<br><strong>Performance Summary:</strong><br>';
                    perfMetrics.forEach(function(m) {
                        html += '&nbsp;&nbsp;&nbsp;' + m.replace(/\s+/g, ' ') + '<br>';
                    });
                }

                return html;
            }

            populateDropdown();
        })();
